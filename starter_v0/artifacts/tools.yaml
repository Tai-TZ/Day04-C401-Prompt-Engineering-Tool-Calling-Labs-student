# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Hỏi lại user khi thiếu thông tin (handle, URL) hoặc cần xác nhận trước hành động gửi. Dùng response_type=yes_no trước khi send."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy bài đăng gần đây của MỘT tài khoản Twitter/X cụ thể (screenname). Dùng khi user hỏi tweet CỦA một người."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm tweet/bài đăng theo CHỦ ĐỀ trên Twitter/X. Không dùng khi user chỉ muốn tin web hoặc đã bỏ Twitter."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tìm tin trên web. topic=news cho tin tức; timeframe day/week theo hôm nay/tuần này. query là từ khóa ngắn (vd AI)."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi text lên Telegram. Chỉ gọi khi user đã xác nhận (confirmed=true)."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  - name: facebook_search
    description: "Tìm kiếm nội dung Facebook (posts/pages/people/events/videos/hashtags) qua RapidAPI Facebook Scraper3."
    parameters:
      type: object
      properties:
        resource:
          type: string
          enum: [posts, pages, people, groups_posts, events, videos, hashtags]
          default: posts
          description: "Loại tài nguyên Facebook cần tìm"
        query: {type: string, default: "", description: "Từ khóa tìm kiếm"}
        limit: {type: integer, default: 5, description: "Số lượng kết quả"}
        cursor: {type: string, default: "", description: "Cursor phân trang (nếu có)"}
      required: [resource, query]

  - name: tiktok_download
    description: "Lấy link tải video TikTok (ưu tiên no-watermark nếu có) qua RapidAPI TikTok Downloader26."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL video TikTok"}
      required: [url]

  - name: summarize_url
    description: "Tóm tắt nhanh nội dung một URL (fetch + summary + key points). Dùng khi user đưa link và muốn tóm tắt."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL cần tóm tắt"}
        max_chars: {type: integer, default: 8000, description: "Giới hạn ký tự để xử lý"}
      required: [url]

  - name: github_repo_search
    description: "Tìm repository GitHub theo ý tưởng/chủ đề. Hỗ trợ lọc language/framework, min stars và sort (stars/forks/updated). Token PAT là tuỳ chọn."
    parameters:
      type: object
      properties:
        idea: {type: string, default: "", description: "Ý tưởng/Từ khoá dự án (vd: rag chatbot)"}
        language_or_framework: {type: string, default: "", description: "Ngôn ngữ hoặc framework (vd: Python, TypeScript, NextJS). Có thể để trống."}
        min_stars: {type: integer, default: 50, description: "Số sao tối thiểu (vd: 50, 100)"}
        sort: {type: string, enum: [stars, forks, updated], default: "stars", description: "Tiêu chí sắp xếp"}
        max_results: {type: integer, default: 5, description: "Số kết quả trả về"}
        token: {type: string, default: "", description: "GitHub Personal Access Token (tuỳ chọn)"}
      required: [idea]
